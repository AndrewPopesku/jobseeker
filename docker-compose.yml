services:
  compiler:
    build:
      context: .
      dockerfile: compiler/Dockerfile
    env_file: .env
    volumes:
      - ./jobseeker/credentials.json:/secrets/gcp-creds/credentials.json:ro
      - ./jobseeker/token.json:/secrets/gcp-token/token.json
    ports:
      - "8081:8080"

  bot:
    build: .
    env_file: .env
    environment:
      COMPILER_SERVICE_URL: http://compiler:8080
    volumes:
      - ./jobseeker/credentials.json:/app/jobseeker/credentials.json:ro
      - ./jobseeker/token.json:/app/jobseeker/token.json
    depends_on:
      - compiler
    restart: unless-stopped
